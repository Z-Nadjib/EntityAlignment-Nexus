experiment:
  name: gcnalign_zh_en_0_3
  model: gcnalign
  seed: 2024
  device: cuda
data:
  root: Data/dbp15k
  lang: zh_en
  fold: '0_3'
  use_mtranse_format: true
model:
  embed_dim: 300
  n_layers: 2
  dropout: 0.0
  activation: false
  normalize_embeddings: true
train:
  epochs: 3000
  lr: 0.001
  optimizer: adam
  weight_decay: 0.0
  grad_clip: 0.0
  early_stop_patience: 0
  margin: 3.0
  k: 25
eval:
  every: 50
  hits_at:
  - 1
  - 5
  - 10
  metric: csls
  csls_k: 3
  eval_chunk: 1024
  direction: both
logging:
  output_dir: experiments
  log_file: training.txt
  config_dump: config_used.yaml
  save_best: true
  save_last: true
  checkpoint_name: model.pt
  embeddings_name: embeddings.pt
  metrics_csv: metrics.csv
  loss_csv: loss.csv
  plots:
    loss_curve: loss_curve.png
    metrics_curve: metrics_curve.png
  log_level: INFO
