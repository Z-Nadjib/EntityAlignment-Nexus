experiment:
  name: naea_zh_en_0_3
  seed: 2024
  device: cuda
data:
  root: Data/dbp15k
  lang: zh_en
  fold: '0_3'
  use_mtranse_format: true
model:
  embed_dim: 300
  attn_heads: 1
  attn_dropout: 0.0
  max_neighbors: 75
  init: xavier
  normalize_embeddings: true
  neighbor_message: trans
train:
  epochs: 500
  batch_size: 4096
  align_batch_size: 1024
  lr: 0.001
  optimizer: adam
  weight_decay: 0.0
  lr_schedule: cosine
  margin_kge: 1.0
  align_pos_margin: 0.3
  align_neg_margin: 1.0
  align_neg_weight: 1.0
  neg_samples: 10
  hard_negatives:
    enabled: true
    num_candidates: 50
    refresh_every: 5
    start_epoch: 10
  align_loss_weight: 5.0
  grad_clip: 0.0
  early_stop_patience: 8
  bootstrap:
    enabled: true
    start_epoch: 30
    every: 5
    threshold: 0.75
    pseudo_weight: 0.4
    max_add: 6000
eval:
  every: 10
  hits_at:
  - 1
  - 5
  - 10
  metric: csls
  csls_k: 10
  eval_chunk: 1024
  direction: both
logging:
  output_dir: logs
  log_file: training.txt
  config_dump: config_used.yaml
  save_best: true
  save_last: true
  checkpoint_name: model.pt
  embeddings_name: embeddings.pt
  metrics_csv: metrics.csv
  loss_csv: loss.csv
  plots:
    loss_curve: loss_curve.png
    metrics_curve: metrics_curve.png
  log_level: INFO
_project_root: /home/nzahaf/EntityAlignment-Nexus
_config_path: /home/nzahaf/EntityAlignment-Nexus/configs/naea_dbp15k.yaml
_run_dir: /home/nzahaf/EntityAlignment-Nexus/logs/naea_zh_en_0_3_20260718-203353
