experiment:
  name: alinet_zh_en_0_3
  model: alinet
  seed: 2024
  device: cuda
data:
  root: Data/dbp15k
  lang: zh_en
  fold: '0_3'
  use_mtranse_format: true
model:
  embed_dim: 500
  layer_dims:
  - 500
  - 500
  max_two_hop: 50
  dropout: 0.1
  normalize_embeddings: true
train:
  epochs: 3000
  lr: 0.001
  optimizer: adam
  weight_decay: 0.0
  lr_schedule: none
  grad_clip: 0.0
  early_stop_patience: 15
  neg_samples: 25
  loss: ranking
  align_margin: 1.0
  align_pos_margin: 0.2
  align_neg_margin: 1.0
  align_neg_weight: 1.0
  relation:
    enabled: true
    weight: 1.0
    margin: 1.0
    batch_size: 20000
  hard_negatives:
    enabled: true
    strategy: mixed
    hard_ratio: 0.5
    num_candidates: 50
    refresh_every: 10
    start_epoch: 100
  bootstrap:
    enabled: false
    start_epoch: 50
    every: 10
    threshold: 0.7
    max_add: 6000
eval:
  every: 20
  hits_at:
  - 1
  - 5
  - 10
  metric: csls
  csls_k: 3
  eval_chunk: 1024
  direction: both
logging:
  output_dir: experiments
  log_file: training.txt
  config_dump: config_used.yaml
  save_best: true
  save_last: true
  checkpoint_name: model.pt
  embeddings_name: embeddings.pt
  metrics_csv: metrics.csv
  loss_csv: loss.csv
  plots:
    loss_curve: loss_curve.png
    metrics_curve: metrics_curve.png
  log_level: INFO
_project_root: /home/nzahaf/EntityAlignment-Nexus
_config_path: /home/nzahaf/EntityAlignment-Nexus/configs/alinet_dbp15k.yaml
